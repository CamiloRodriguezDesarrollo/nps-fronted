<div class="container">
  <div class="login-card">
    <div class="brand">
      <h2>Ingreso al sistema</h2>
      <p>Accede con tu usuario o pide al administrador que te cree una cuenta.</p>
    </div>

    <div class="fields">
      <label>
        Usuario
        <input
          type="text"
          placeholder="Ingresa tu nombre de usuario"
          [(ngModel)]="username">
      </label>

      <label>
        Contraseña
        <input
          type="password"
          placeholder="Ingresa tu contraseña"
          [(ngModel)]="password">
      </label>
    </div>

    <button class="primary" (click)="login()">
      Ingresar
    </button>

  </div>
</div>
