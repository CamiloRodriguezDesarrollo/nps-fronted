<div class="container">
  <div class="login-card">
    <div class="brand">
      <h2>Ingreso al sistema</h2>
      <p>Accede con tu usuario o crea uno nuevo si aún no tienes cuenta.</p>
    </div>

    <div class="fields">
      <label>
        Usuario
        <input
          type="text"
          placeholder="Ingresa tu nombre de usuario"
          [(ngModel)]="username">
      </label>

      <label>
        Contraseña
        <input
          type="password"
          placeholder="Ingresa tu contraseña"
          [(ngModel)]="password">
      </label>
    </div>

    <button class="primary" (click)="login()">
      Ingresar
    </button>

    <div class="actions">
      <button class="secondary" (click)="createUser()">
        Crear mi usuario
      </button>
      <button class="secondary" (click)="createValidationSeed()">
        Generar seed de validación
      </button>
    </div>

    <p class="helper-text">Usa el botón de crear usuario si necesitas registrarte. El seed sirve para validaciones y pruebas.</p>
  </div>
</div>
